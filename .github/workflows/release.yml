name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          cargo_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          staging="bcp-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/bcp" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: ${{ env.ASSET }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 values
        id: shas
        run: |
          version="${GITHUB_REF_NAME#v}"
          macos_sha=$(sha256sum sha256-aarch64-apple-darwin/*.tar.gz | awk '{print $1}')
          linux_sha=$(sha256sum sha256-x86_64-unknown-linux-gnu/*.tar.gz | awk '{print $1}')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "macos_sha=$macos_sha" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$linux_sha" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = '${{ steps.shas.outputs.version }}';
            const macosSha = '${{ steps.shas.outputs.macos_sha }}';
            const linuxSha = '${{ steps.shas.outputs.linux_sha }}';

            const {data: file} = await github.rest.repos.getContent({
              owner: 'erasmas',
              repo: 'homebrew-bcp',
              path: 'Formula/bcp.rb',
            });

            let content = Buffer.from(file.content, 'base64').toString();
            content = content.replace(/version ".*"/, `version "${version}"`);
            content = content.replace(
              /(on_arm do\n\s+url "[^"]+"\n\s+sha256 )"\w+"/,
              `$1"${macosSha}"`
            );
            content = content.replace(
              /(on_intel do\n\s+url "[^"]+"\n\s+sha256 )"\w+"/,
              `$1"${linuxSha}"`
            );

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'erasmas',
              repo: 'homebrew-bcp',
              path: 'Formula/bcp.rb',
              message: `Update bcp to ${version}`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            });
